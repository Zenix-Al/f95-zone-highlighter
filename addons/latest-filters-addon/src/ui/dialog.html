<div class="f95ue-lf-dialog" role="dialog" aria-modal="true" aria-label="Saved Filters">
  <div class="f95ue-lf-popover-header">
    <div class="f95ue-lf-popover-title">Saved Filters</div>
    <button type="button" class="f95ue-lf-close" data-action="close-panel" aria-label="Close">
      &#x2715;
    </button>
  </div>
  <div class="f95ue-lf-current" data-role="current"></div>
  <div class="f95ue-lf-save-row">
    <input type="text" data-role="save-name" placeholder="Preset name" maxlength="80" />
    <button type="button" class="f95ue-lf-btn primary" data-action="save-current">
      Save Current
    </button>
  </div>
  <div class="f95ue-lf-toolbar">
    <input type="search" data-role="search" placeholder="Filter saved presets" value="" />
  </div>
  <div class="f95ue-lf-results" data-role="results"></div>
</div>
